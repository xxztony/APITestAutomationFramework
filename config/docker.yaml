environment: docker

services:
  bff:
    base_url: http://bff:8000
    timeout_seconds: 10
  keycloak:
    token_url: http://keycloak:8080/realms/trading-demo/protocol/openid-connect/token
    client_id: trading-demo-tests
    username: ${IAM_TEST_USERNAME:-qa.user}
    password: ${IAM_TEST_PASSWORD:-qa123456}
    refresh_skew_seconds: 60
    timeout_seconds: 10
  reportportal:
    enabled: false
    endpoint: http://host.docker.internal:8080
    project: superadmin_personal
    api_key: ${RP_API_KEY:-}
    launch: Trading QA IAM API Tests

logging:
  level: INFO
  max_body_chars: 100000
  redact_headers: [authorization, cookie, set-cookie, proxy-authorization]

